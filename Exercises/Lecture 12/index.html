<!-- You are given 12 files; 6 audio and 6 video.
    Design a website using HTML only which shows these 12 files.
    1.mp3, 2.mp3, 3.mp3, 4.mp3, 5.mp3, 6.mp3
    1.mp4, 2.mp4, 3.mp4, 4.mp4, 5.mp4, 6.mp4 -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Audio and Video Files</h1>
    </header>
    <nav>
        <ul>
            <li><a href="#audio">Audio Files</a></li>
            <li><a href="#video">Video Files</a></li>
        </ul>
    </nav>
    <main>
        <section>
            <h2 id="audio">Audio Files</h2>
            <audio controls>
                <source src="mp3/1.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            <audio controls>
                <source src="mp3/2.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            <audio controls>
                <source src="mp3/3.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            <audio controls>
                <source src="mp3/4.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            <audio controls>
                <source src="mp3/5.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            <audio controls>
                <source src="mp3/6.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </section>

        <section>
            <h2 id="video">Video Files</h2>
            <video controls loop autoplay>
                <source src="mp4/1.mp4" type="video/mp4">
                Your browser does not support the video element.
            </video>
            <video controls loop autoplay>
                <source src="mp4/2.mp4" type="video/mp4">
                Your browser does not support the video element.
            </video>
            <video controls loop autoplay>
                <source src="mp4/3.mp4" type="video/mp4">
                Your browser does not support the video element.
            </video>
            <video controls loop autoplay>
                <source src="mp4/4.mp4" type="video/mp4">
                Your browser does not support the video element.
            </video>
            <video controls loop autoplay>
                <source src="mp4/5.mp4" type="video/mp4">
                Your browser does not support the video element.
            </video>
            <video controls loop autoplay>
                <source src="mp4/6.mp4" type="video/mp4">
                Your browser does not support the video element.
            </video>
        </section>

    <footer id="footer">
        <p>All files are listed below:</p>

        <div><b>Audio Files:</b> 1.mp3, 2.mp3, 3.mp3, 4.mp3, 5.mp3, 6.mp3</div>
        <div><b>Video Files:</b> 1.mp4, 2.mp4, 3.mp4, 4.mp4, 5.mp4, 6.mp4</div>
    </footer>
</body>
</html>
